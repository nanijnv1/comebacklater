<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Come Back Later</title>
<meta name="description" content="The site isn't ready. It will never be ready. Please come back later." />
<meta name="theme-color" content="#0f0f17" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>😜</text></svg>" />
<!-- Open Graph / social preview -->
<meta property="og:title" content="Come Back Later" />
<meta property="og:description" content="The site isn't ready. It will never be ready. Please come back later." />
<meta property="og:type" content="website" />
<style>
  :root {
    --bg: #0f0f17;
    --bg2: #16161f;
    --fg: #f4f4f8;
    --muted: #9aa0b4;
    --accent: #ff5d73;
    --accent2: #5dc2ff;
    --ok: #5dffa0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: ui-rounded, "SF Pro Rounded", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: radial-gradient(1200px 800px at 50% -10%, #1d1d2c 0%, var(--bg) 55%);
    color: var(--fg);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow-x: hidden;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 620px; width: 100%; position: relative; z-index: 2; }
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: .35em;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  h1 {
    font-size: clamp(40px, 11vw, 92px);
    line-height: 0.95;
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(120deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 18px;
  }
  .excuse {
    font-size: clamp(16px, 4.5vw, 21px);
    color: var(--muted);
    min-height: 3.2em;
    margin: 0 auto 28px;
    max-width: 480px;
    transition: opacity .25s ease;
  }
  .countdown {
    font-variant-numeric: tabular-nums;
    font-size: clamp(14px, 4vw, 18px);
    color: var(--fg);
    background: var(--bg2);
    border: 1px solid #262636;
    border-radius: 14px;
    padding: 14px 18px;
    display: inline-block;
    margin-bottom: 30px;
  }
  .countdown b { color: var(--accent2); }
  .btn-row { position: relative; height: 64px; margin-bottom: 26px; }
  button {
    font: inherit;
    font-weight: 700;
    font-size: 17px;
    color: #15151f;
    background: var(--fg);
    border: 0;
    border-radius: 999px;
    padding: 15px 30px;
    cursor: pointer;
    transition: transform .12s ease, background .2s ease, box-shadow .2s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,.4);
    white-space: nowrap;
  }
  button:hover { background: #fff; }
  button:active { transform: scale(.96); }
  #enterBtn { position: absolute; left: 50%; top: 0; transform: translateX(-50%); }
  #enterBtn.runaway {
    position: fixed;
    z-index: 6;
    transform: none;
    transition: left .3s cubic-bezier(.34,1.56,.64,1), top .3s cubic-bezier(.34,1.56,.64,1);
  }
  .stats {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }
  .stats b { color: var(--fg); }
  footer {
    position: fixed;
    bottom: 16px;
    left: 0; right: 0;
    color: #4a4a60;
    font-size: 12px;
    z-index: 2;
  }
  footer a { color: #6a6a85; text-decoration: none; }
  footer .powered {
    display: inline-block;
    margin-top: 6px;
    letter-spacing: .04em;
    font-size: 11px;
    color: #5a5a72;
  }
  footer .powered .brand {
    font-weight: 700;
    color: #8a8aa8;
    letter-spacing: .02em;
  }
  footer .powered sup {
    font-size: 7px;
    vertical-align: super;
    margin-left: 1px;
  }
  /* floating background emoji */
  .floaty {
    position: fixed;
    z-index: 0;
    font-size: 28px;
    opacity: .12;
    pointer-events: none;
    animation: drift linear infinite;
  }
  @keyframes drift {
    from { transform: translateY(110vh) rotate(0deg); }
    to   { transform: translateY(-20vh) rotate(360deg); }
  }
  /* console easter-egg reveal */
  #eggBanner {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(8,8,14,.72);
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity .3s ease;
  }
  #eggBanner.show { opacity: 1; }
  #eggBanner .egg-card {
    max-width: 440px;
    width: 100%;
    background: var(--bg2);
    border: 1px solid #2c2c40;
    border-radius: 20px;
    padding: 30px 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,.55);
    transform: scale(.85) translateY(10px);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  #eggBanner.show .egg-card { transform: scale(1) translateY(0); }
  #eggBanner .egg-emoji { font-size: 40px; margin-bottom: 8px; }
  #eggBanner h2 {
    font-size: 26px;
    margin-bottom: 12px;
    background: linear-gradient(120deg, var(--ok), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #eggBanner p { color: var(--muted); font-size: 15px; line-height: 1.6; }
  #eggBanner .egg-respect { margin-top: 14px; color: var(--fg); }
  #eggBanner .egg-respect b { color: var(--accent2); }
  #eggBanner .egg-code {
    margin-top: 14px;
    font-family: ui-monospace, monospace;
    letter-spacing: .08em;
    color: var(--ok);
    background: #11221a;
    border-radius: 8px;
    padding: 8px 12px;
    display: inline-block;
  }
  #eggBanner .egg-close {
    margin-top: 22px;
    font-size: 15px;
    padding: 12px 24px;
  }
  @media (prefers-reduced-motion: reduce) {
    #eggBanner, #eggBanner .egg-card { transition: none; }
    #enterBtn.runaway { transition: none; }
    .floaty { animation: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Status: definitely not ready</div>
    <h1>Come back later.</h1>
    <p class="excuse" id="excuse">We're putting the finishing touches on absolutely nothing.</p>

    <div class="countdown" id="countdown">Ready in <b id="cd">…</b></div>

    <div class="btn-row">
      <button id="enterBtn">Enter the site anyway →</button>
    </div>

    <div class="stats" id="stats"></div>
  </div>

  <footer>comebacklater.in — <a id="resetLink" href="#">reset my shame</a><br><span class="powered">⚡ powered by <span class="brand">Rogue Engineer</span><sup>®</sup></span></footer>

<script>
(function () {
  "use strict";

  /* ---------- persistent state ---------- */
  // visits persist across sessions (localStorage); dodges live in memory only,
  // so every reload counts as a fresh session and resets the chase to 0.
  var VKEY = "cbl-visits-v1";
  var state = { visits: 0, dodges: 0 };
  try { state.visits = parseInt(localStorage.getItem(VKEY) || "0", 10) || 0; } catch (e) {}
  state.visits += 1;
  save();
  function save() {
    try { localStorage.setItem(VKEY, String(state.visits)); } catch (e) {}
  }

  /* ---------- excuses ---------- */
  var excuses = [
    "We're putting the finishing touches on absolutely nothing.",
    "The developers went to get coffee in 2019. Still waiting.",
    "Our hamster that powers the server is on a lunch break.",
    "The website is 99% done. It has been 99% done for three years.",
    "We tried turning it off and on again. It's now more off.",
    "Loading… loading… okay it's not loading.",
    "The launch is scheduled for 'soon™'.",
    "Mercury is in retrograde and so is our deploy pipeline.",
    "Someone deleted the production database. We're calling it a feature.",
    "We're waiting for the vibes to be exactly right.",
    "The intern who knew the password graduated.",
    "Technically the internet is ready. We are not.",
    "We're A/B testing whether anyone notices there's no site.",
    "The roadmap is finished. We just can't find the road.",
    "Our CEO said 'ship it' and we have not seen them since.",
    "We're blocked on a meeting about scheduling the meeting.",
    "It works on my machine. My machine is also unavailable.",
    "The site is in beta. Beta stands for 'be there… eventually.'",
    "We ran out of semicolons. Procurement is on it.",
    "Rome wasn't built in a day, and neither was this. Or at all.",
    "We pivoted to a startup that builds 'come back later' pages.",
    "The frontend and backend are not currently on speaking terms.",
    "We're waiting for the cloud to clear up.",
    "Patience is a feature. We shipped a lot of it.",
    "Our designer is still choosing between two identical shades of grey.",
    "404: Motivation not found.",
    "We outsourced the launch to future us. Future us is slacking.",
    "Good things come to those who wait. This is neither, but wait anyway."
  ];
  var excuseEl = document.getElementById("excuse");
  var ei = 0;
  function nextExcuse() {
    excuseEl.style.opacity = "0";
    setTimeout(function () {
      ei = (ei + 1 + Math.floor(Math.random() * (excuses.length - 1))) % excuses.length;
      excuseEl.textContent = excuses[ei];
      excuseEl.style.opacity = "1";
    }, 250);
  }
  excuseEl.textContent = excuses[0];
  setInterval(nextExcuse, 4200);

  /* ---------- real countdown to 2127-01-01 ---------- */
  var cd = document.getElementById("cd");
  var RELEASE = new Date(2127, 0, 1, 0, 0, 0); // Jan 1, 2127, local time
  function fmt(n) { return String(n).padStart(2, "0"); }
  function tickCountdown() {
    var totalSec = Math.floor((RELEASE.getTime() - Date.now()) / 1000);
    if (totalSec <= 0) { cd.textContent = "it's ready?! (impossible)"; return; }
    var years = Math.floor(totalSec / (365 * 24 * 3600));
    var rem = totalSec % (365 * 24 * 3600);
    var days = Math.floor(rem / (24 * 3600));
    rem %= 24 * 3600;
    var h = Math.floor(rem / 3600);
    rem %= 3600;
    var m = Math.floor(rem / 60);
    var s = rem % 60;
    cd.textContent =
      years + "y " + days + "d " + fmt(h) + ":" + fmt(m) + ":" + fmt(s) +
      "  (" + totalSec.toLocaleString() + " seconds)";
  }
  tickCountdown();
  setInterval(tickCountdown, 1000);

  /* ---------- runaway button ---------- */
  var btn = document.getElementById("enterBtn");
  var row = btn.parentElement;

  // taunts shown every 5 dodges, picked at random — the chase never ends
  var taunts = [
    "Missed me.",
    "Nope.",
    "Too slow!",
    "Still nope.",
    "Catch me if you can.",
    "You're persistent…",
    "Why are we like this.",
    "Respect the hustle, honestly.",
    "Not today.",
    "Almost! …no.",
    "Keep dreaming.",
    "This is my cardio.",
    "You'll tire before I do.",
    "Forever, baby."
  ];

  function dodge() {
    state.dodges += 1;
    save();
    renderStats();

    // every 5th dodge, taunt with a random message
    if (state.dodges % 5 === 0) {
      btn.textContent = taunts[Math.floor(Math.random() * taunts.length)];
    }

    // capture current center BEFORE switching to fixed positioning
    var prev = btn.getBoundingClientRect();
    var pcx = prev.left + prev.width / 2;
    var pcy = prev.top + prev.height / 2;

    btn.classList.add("runaway");

    // jump anywhere in the viewport, with a little edge padding
    var pad = 14;
    var bw = btn.offsetWidth, bh = btn.offsetHeight;
    var maxX = Math.max(pad, window.innerWidth - bw - pad);
    var maxY = Math.max(pad, window.innerHeight - bh - pad);
    // require a big leap away from where it just was
    var minLeap = Math.min(window.innerWidth, window.innerHeight) * 0.5;
    var x, y, tries = 0;
    do {
      x = pad + Math.random() * (maxX - pad);
      y = pad + Math.random() * (maxY - pad);
      tries++;
    } while (Math.hypot((x + bw / 2) - pcx, (y + bh / 2) - pcy) < minLeap && tries < 12);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
  }

  // dodge on hover (desktop), touch (mobile), and any click — it never lets go
  btn.addEventListener("mouseenter", dodge);
  btn.addEventListener("touchstart", function (e) {
    e.preventDefault();
    dodge();
  }, { passive: false });
  btn.addEventListener("click", function (e) {
    e.preventDefault();
    dodge();
  });

  /* ---------- stats ---------- */
  var statsEl = document.getElementById("stats");
  function renderStats() {
    var v = state.visits, d = state.dodges;
    statsEl.innerHTML =
      "You've come back <b>" + v + "</b> time" + (v === 1 ? "" : "s") + ". Still not ready.<br>" +
      "The button has dodged you <b>" + d + "</b> time" + (d === 1 ? "" : "s") + ".";
  }
  renderStats();

  /* ---------- reset ---------- */
  document.getElementById("resetLink").addEventListener("click", function (e) {
    e.preventDefault();
    state = { visits: 1, dodges: 0 };
    save();
    location.reload();
  });

  /* ---------- floating background emoji ---------- */
  var floats = ["⏳", "🚧", "🛠️", "☕", "🐌", "💤", "🔌", "📦"];
  for (var i = 0; i < 8; i++) {
    (function (i) {
      var s = document.createElement("div");
      s.className = "floaty";
      s.textContent = floats[i % floats.length];
      s.style.left = (5 + i * 12) + "%";
      s.style.fontSize = (22 + (i % 4) * 10) + "px";
      s.style.animationDuration = (16 + (i % 5) * 6) + "s";
      s.style.animationDelay = "-" + (i * 3) + "s";
      document.body.appendChild(s);
    })(i);
  }

  /* ---------- console-only easter egg ---------- */
  // Invisible on the page — you can only find this by opening devtools.
  // The hint printed below is scrambled; figuring out how to read it is the puzzle.
  // Decode it to learn the magic words, then run them to unlock the funny message.
  var EGG_SECRET = "the-button-was-the-friends-we-made-along-the-way";
  var EGG_HINT = btoa('knock, and it shall open. the password is:  ' + EGG_SECRET);

  console.log("%c👀 Pssst… you opened the console.", "font-size:20px;font-weight:800;color:#ff5d73");
  console.log("%cThere's a secret in here somewhere. Can you read this?", "color:#5dc2ff;font-size:13px");
  console.log("%c    " + EGG_HINT, "color:#5dffa0;font-size:13px;font-family:monospace");

  function revealEggUi() {
    if (document.getElementById("eggBanner")) return; // only once
    var el = document.createElement("div");
    el.id = "eggBanner";
    el.innerHTML =
      "<div class='egg-card'>" +
        "<div class='egg-emoji'>🕵️🎉</div>" +
        "<h2>Secret unlocked.</h2>" +
        "<p>You decoded the console, outsmarted a button you could never catch, " +
        "and got rewarded with… this little box. Truly, you have too much time.</p>" +
        "<p class='egg-respect'>🫡 <b>Rogue Engineer</b> respects and appreciates you.</p>" +
        "<p class='egg-code'>CONSOLE-COWBOY-9000</p>" +
        "<button class='egg-close' id='eggClose'>back to the chase →</button>" +
      "</div>";
    document.body.appendChild(el);
    requestAnimationFrame(function () { el.classList.add("show"); });
    document.getElementById("eggClose").addEventListener("click", function () {
      el.classList.remove("show");
      setTimeout(function () { el.remove(); }, 300);
    });
  }

  window.knock = function (code) {
    if (code === EGG_SECRET) {
      console.log("%c🎉  ACCESS GRANTED  🎉", "font-size:22px;font-weight:800;color:#5dffa0;text-shadow:0 0 8px #5dffa0");
      console.log(
        "%cThe secret site is… this one. You were here the whole time.\n" +
        "Your reward for outsmarting a button you could never catch:\n" +
        "the warm glow of productively wasted time. 🏆\n" +
        "🫡 Rogue Engineer respects and appreciates you.\n" +
        "Coupon (redeemable never): CONSOLE-COWBOY-9000",
        "color:#f4f4f8;font-size:14px;line-height:1.7"
      );
      revealEggUi();
      return "🤝 we both know you'll go chase that button again.";
    }
    console.log("%c❌ Nope. Wrong magic words. Decode it again, detective. 🕵️", "color:#ff5d73;font-size:13px");
    return "try again";
  };
})();
</script>
</body>
</html>
